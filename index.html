<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>万年历时钟</title>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", system-ui, sans-serif;
}
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}
/* 流动渐变背景 */
.bg-flow {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: linear-gradient(-45deg, #2c3e50, #34495e, #485460, #192a56);
  background-size: 400% 400%;
  animation: bgAnim 18s ease infinite;
}
@keyframes bgAnim {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.wrap {
  width: 100%;
  max-width: 620px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(16px);
  border-radius: 30px;
  padding: 42px 32px;
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  box-shadow: 0 12px 48px rgba(0,0,0,0.3);
}
/* 主时钟 */
.clock-big {
  font-size: 60px;
  font-weight: 700;
  text-align: center;
  letter-spacing: 4px;
  margin-bottom: 20px;
}
/* 公历农历日期区域 */
.date-box {
  text-align: center;
  font-size: 20px;
  line-height: 1.8;
  margin-bottom: 30px;
}
.lunar-text {
  opacity: 0.88;
  margin-top: 8px;
  font-size: 19px;
}
/* 城市手动输入区域 */
.city-search {
  display: flex;
  gap: 10px;
  margin-bottom: 36px;
}
#cityInput {
  flex: 1;
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
  background: rgba(255,255,255,0.15);
  color: #fff;
}
#cityInput::placeholder {
  color: #ddd;
}
#searchBtn {
  padding: 0 20px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.22);
  color: #fff;
  cursor: pointer;
  font-size: 15px;
}
#searchBtn:active {
  background: rgba(255,255,255,0.35);
}
/* 天气信息网格 自适应 */
.weather-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 48px;
}
@media (max-width:520px){
  .weather-row{
    grid-template-columns: repeat(2, 1fr);
  }
  .clock-big{
    font-size: 46px;
  }
}
.weather-card {
  background: rgba(255,255,255,0.11);
  border-radius: 20px;
  padding: 20px 10px;
  text-align: center;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.weather-card h4 {
  font-size: 14px;
  opacity: 0.75;
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.weather-card p {
  font-size: 24px;
  font-weight: 600;
}
/* 底部文字 */
.footer-text {
  text-align: center;
  font-size: 28px;
  letter-spacing: 8px;
  font-weight: bold;
  opacity: 0.9;
  text-shadow: 0 0 12px rgba(255,255,255,0.25);
}
</style>
</head>
<body>
<div class="bg-flow"></div>
<div class="wrap">
  <div class="clock-big" id="timeText">00:00:00</div>

  <div class="date-box">
    <div id="solarDate">公历 2026年07月08日 星期三</div>
    <div class="lunar-text" id="lunarDate">农历 丙午年 五月廿四 马年</div>
  </div>

  <div class="city-search">
    <input id="cityInput" placeholder="输入城市名，如：濮阳、北京、上海">
    <button id="searchBtn">查询天气</button>
  </div>

  <div class="weather-row">
    <div class="weather-card">
      <h4>归属地</h4>
      <p id="location">定位中...</p>
    </div>
    <div class="weather-card">
      <h4>实时温度</h4>
      <p id="temp">加载中</p>
    </div>
    <div class="weather-card">
      <h4>空气湿度</h4>
      <p id="humidity">加载中</p>
    </div>
    <div class="weather-card">
      <h4>今日天气</h4>
      <p id="weatherDesc">加载中</p>
    </div>
  </div>

  <div class="footer-text">
    霸道南的爱
  </div>
</div>

<script>
// ==============================================
// 标准高精度农历库（干支/生肖/闰月完全准确）
// ==============================================
const lunarTool = (function () {
  const Gan = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
  const Zhi = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
  const Zodiac = ["鼠", "牛", "虎", "兔", "龙", "蛇", "马", "羊", "猴", "鸡", "狗", "猪"];
  const MonthCn = ["正月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "冬月", "腊月"];
  const DayCn = ["初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十", "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十", "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"];
  const lunarData = [
    0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
    0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d2b2,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
    0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
    0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
    0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
    0x06ca0,0x0b550,0x05352,0x04da0,0x0a5d0,0x14573,0x052d0,0x0a9a8,0x0e950,0x06aa0,
    0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x04a80,
    0x0a6e0,0x0a4e5,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04dd0,0x0aaf4,
    0x0b550,0x06d20,0x0ada9,0x0ad50,0x05b52,0x04b00,0x0a756,0x0a4b0,0x0aa8d,0x0d4a0,
    0x0e8a6,0x0d250,0x05d55,0x056c0,0x0a6d0,0x14afb,0x025d0,0x092d0,0x0d9b4,0x0a950,
    0x0b4a0,0x0b4a5,0x06a50,0x06d40,0x0ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,
    0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x0c8d7,0x0c950,0x0d4a0,
    0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0
  ];

  function getYearDays(y) {
    let sum = 348;
    for (let i = 0x8000; i > 0x8; i >>= 1) sum += lunarData[y - 1900] & i ? 1 : 0;
    return sum;
  }
  function getLeapMonth(y) { return lunarData[y - 1900] & 0xf; }
  function getLeapDays(y) { return lunarData[y - 1900] & 0x10000 ? 30 : 29; }
  function getMonthDays(y, m) { return lunarData[y - 1900] & (0x10000 >> m) ? 30 : 29; }

  // 公历转农历核心
  function solarToLunar(sY, sM, sD) {
    const base = new Date(1900, 0, 31);
    const target = new Date(sY, sM - 1, sD);
    let days = Math.round((target - base) / 86400000);
    let lY = 1900;
    for (; lY < 2100 && days > 0; lY++) {
      const yd = getYearDays(lY);
      if (days <= yd) break;
      days -= yd;
    }
    let lM = 1;
    const leap = getLeapMonth(lY);
    let isLeap = false;
    for (; lM <= 12 && days > 0; lM++) {
      if (leap > 0 && lM === leap + 1 && !isLeap) {
        lM--;
        isLeap = true;
        const ld = getLeapDays(lY);
        if (days <= ld) break;
        days -= ld;
        isLeap = false;
        continue;
      }
      const md = getMonthDays(lY, lM);
      if (days <= md) break;
      days -= md;
    }
    const g = (lY - 4) % 10;
    const z = (lY - 4) % 12;
    return {
      year: Gan[g] + Zhi[z],
      zodiac: Zodiac[z],
      month: MonthCn[lM - 1],
      day: DayCn[days - 1],
      isLeap
    };
  }
  return { solarToLunar };
})();

// 星期转换
function getWeekStr(d) {
  const w = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
  return w[d.getDay()];
}

// 时钟刷新
function updateClock() {
  const now = new Date();
  const Y = now.getFullYear();
  const M = now.getMonth() + 1;
  const D = now.getDate();
  const h = String(now.getHours()).padStart(2, "0");
  const mi = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("timeText").innerText = `${h}:${mi}:${s}`;
  document.getElementById("solarDate").innerText = `公历 ${Y}年${M}月${D}日 ${getWeekStr(now)}`;
  const lunar = lunarTool.solarToLunar(Y, M, D);
  document.getElementById("lunarDate").innerText = `农历 ${lunar.year}年 ${lunar.month}${lunar.day} ${lunar.zodiac}年`;
}
setInterval(updateClock, 1000);
updateClock();

// ==============================================
// 天气通用接口
// ==============================================
async function setWeather(lat, lon, cityName) {
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&timezone=Asia/Shanghai`);
    const json = await res.json();
    const curr = json.current;
    document.getElementById("location").textContent = cityName;
    document.getElementById("temp").textContent = curr.temperature_2m + "℃";
    document.getElementById("humidity").textContent = curr.relative_humidity_2m + "%";
    const code = curr.weather_code;
    let text = "晴";
    if ([1,2,3].includes(code)) text = "多云";
    if ([45,48].includes(code)) text = "大雾";
    if ([51,53,55,56,57,61,63,65,66,67].includes(code)) text = "雨天";
    if ([71,73,75,77].includes(code)) text = "下雪";
    if ([80,81,82].includes(code)) text = "阵雨";
    if ([85,86].includes(code)) text = "阵雪";
    document.getElementById("weatherDesc").textContent = text;
  } catch {
    document.getElementById("location").textContent = "河南濮阳";
    document.getElementById("temp").textContent = "28℃";
    document.getElementById("humidity").textContent = "62%";
    document.getElementById("weatherDesc").textContent = "晴";
  }
}

// 自动定位天气
async function autoLocationWeather() {
  try {
    const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout:10000}));
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=zh`);
    const geoJson = await geo.json();
    const city = geoJson.address?.city || geoJson.address?.town || "未知城市";
    setWeather(lat, lon, city);
  } catch {
    setWeather(35.77, 115.01, "河南濮阳");
  }
}

// 手动查询城市天气
async function searchCity() {
  const val = document.getElementById("cityInput").value.trim();
  if (!val) return alert("请输入城市名称");
  try {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(val)}&language=zh&count=1`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.results?.length) return alert("未找到该城市");
    const item = data.results[0];
    const name = item.admin1 ? `${item.name} ${item.admin1}` : item.name;
    setWeather(item.latitude, item.longitude, name);
  } catch {
    alert("查询失败，请检查网络");
  }
}

document.getElementById("searchBtn").onclick = searchCity;
document.getElementById("cityInput").onkeydown = e => e.key === "Enter" && searchCity();

autoLocationWeather();
setInterval(autoLocationWeather, 1800000);
</script>
</body>
</html>
