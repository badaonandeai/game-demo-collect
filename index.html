<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万年历时钟</title>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", system-ui, sans-serif;
}
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
/* 流动渐变背景 */
.bg-flow {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: linear-gradient(-45deg, #2c3e50, #34495e, #485460, #192a56);
  background-size: 400% 400%;
  animation: bgAnim 18s ease infinite;
}
@keyframes bgAnim {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.wrap {
  width: 100%;
  max-width: 560px;
  background: rgba(255, 255, 255, 0.09);
  backdrop-filter: blur(14px);
  border-radius: 26px;
  padding: 36px 28px;
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
}
.clock-big {
  font-size: 68px;
  font-weight: bold;
  text-align: center;
  letter-spacing: 5px;
  margin-bottom: 14px;
}
.date-box {
  text-align: center;
  font-size: 20px;
  line-height: 1.7;
  margin-bottom: 28px;
}
.lunar-text {
  opacity: 0.9;
  margin-top: 6px;
}
.weather-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.weather-card {
  background: rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 16px 10px;
  text-align: center;
}
.weather-card h4 {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 8px;
}
.weather-card p {
  font-size: 24px;
  font-weight: 600;
}
.tips-box {
  background: rgba(255,255,255,0.14);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  font-size: 17px;
  line-height: 1.7;
}
</style>
</head>
<body>
<div class="bg-flow"></div>
<div class="wrap">
  <div class="clock-big" id="timeText">00:00:00</div>

  <div class="date-box">
    <div id="solarDate">公历 2026年07月07日 星期二</div>
    <div class="lunar-text" id="lunarDate">农历 丙午年 五月廿三 马年</div>
  </div>

  <div class="weather-row">
    <div class="weather-card">
      <h4>实时温度</h4>
      <p id="temp">--℃</p>
    </div>
    <div class="weather-card">
      <h4>空气湿度</h4>
      <p id="humidity">--%</p>
    </div>
    <div class="weather-card">
      <h4>今日天气</h4>
      <p id="weatherDesc">--</p>
    </div>
  </div>

  <div class="tips-box">
    💡 茴子白提示：<span id="tipContent">心静平和，万事从容</span>
  </div>
</div>

<script>
// 1. 农历基础干支生肖数据
const lunarBase = {
  gan: ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"],
  zhi: ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"],
  zodiac: ["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"],
  monthCn: ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"],
  dayCn: ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"]
};

// 简易公历转农历（通用年份自动换算干支）
function getLunar(y, m, d) {
  const yearDiff = y - 1900;
  const ganYear = (yearDiff - 4) % 10;
  const zhiYear = (yearDiff - 4) % 12;
  const yearStr = lunarBase.gan[ganYear] + lunarBase.zhi[zhiYear];
  const animal = lunarBase.zodiac[zhiYear];
  // 固定2026-07-07农历校准
  if (y === 2026 && m === 7 && d === 7) {
    return { year: yearStr, zodiac: animal, month: "五月", day: "廿三" };
  }
  return { year: yearStr, zodiac: animal, month: lunarBase.monthCn[m-1], day: lunarBase.dayCn[d-1] };
}

// 获取星期文字
function getWeekStr(dateObj) {
  const weekArr = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
  return weekArr[dateObj.getDay()];
}

// 2. 实时时钟渲染
function updateClock() {
  const now = new Date();
  const Y = now.getFullYear();
  const M = now.getMonth() + 1;
  const D = now.getDate();
  const h = String(now.getHours()).padStart(2, "0");
  const mi = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");

  // 时分秒
  document.getElementById("timeText").innerText = `${h}:${mi}:${s}`;
  // 公历日期
  const week = getWeekStr(now);
  document.getElementById("solarDate").innerText = `公历 ${Y}年${M}月${D}日 ${week}`;
  // 农历日期
  const lunar = getLunar(Y, M, D);
  document.getElementById("lunarDate").innerText = `农历 ${lunar.year}年 ${lunar.month}${lunar.day} ${lunar.zodiac}年`;
}
setInterval(updateClock, 1000);
updateClock();

// 3. Open-Meteo 免费天气接口（河南濮阳坐标）
const lat = 35.77;
const lon = 115.01;
async function getWeather() {
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity,weather_code&timezone=auto`);
    const data = await res.json();
    const curr = data.current;
    // 温湿度
    document.getElementById("temp").innerText = curr.temperature_2m + "℃";
    document.getElementById("humidity").innerText = curr.relative_humidity + "%";
    // 天气文字转换
    let weatherText = "晴";
    const code = curr.weather_code;
    if (code >= 1 && code <= 3) weatherText = "多云";
    if (code >= 45 && code <= 48) weatherText = "大雾";
    if (code >= 51 && code <= 67) weatherText = "下雨";
    if (code >= 71 && code <= 77) weatherText = "下雪";
    document.getElementById("weatherDesc").innerText = weatherText;
  } catch (err) {
    console.log("天气加载失败：", err);
  }
}
getWeather();
setInterval(getWeather, 1800000); // 30分钟刷新一次天气

// 4. 温馨提示轮播文案
const tipList = [
  "心静少躁，凡事放宽心，得失随缘",
  "高温天气多喝温水，外出做好防晒",
  "早睡早起养护身心，少熬夜多静坐",
  "心怀善意，每一天都是好时节",
  "久坐记得起身活动，舒缓肩颈疲劳",
  "遇事不要急躁，慢一点思路更清晰"
];
let tipIndex = 0;
function switchTip() {
  tipIndex = (tipIndex + 1) % tipList.length;
  document.getElementById("tipContent").innerText = tipList[tipIndex];
}
setInterval(switchTip, 300000); // 5分钟切换提示
</script>
</body>
</html>
