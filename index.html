<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>万年历时钟</title>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", system-ui, sans-serif;
}
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}
/* 流动渐变背景 */
.bg-flow {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: linear-gradient(-45deg, #2c3e50, #34495e, #485460, #192a56);
  background-size: 400% 400%;
  animation: bgAnim 18s ease infinite;
}
@keyframes bgAnim {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.wrap {
  width: 100%;
  max-width: 620px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(16px);
  border-radius: 30px;
  padding: 42px 32px;
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  box-shadow: 0 12px 48px rgba(0,0,0,0.3);
}
/* 主时钟 */
.clock-big {
  font-size: 60px;
  font-weight: 700;
  text-align: center;
  letter-spacing: 4px;
  margin-bottom: 20px;
}
/* 公历农历日期区域 */
.date-box {
  text-align: center;
  font-size: 20px;
  line-height: 1.8;
  margin-bottom: 40px;
}
.lunar-text {
  opacity: 0.88;
  margin-top: 8px;
  font-size: 19px;
}
/* 天气信息网格 自适应 */
.weather-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 48px;
}
@media (max-width:520px){
  .weather-row{
    grid-template-columns: repeat(2, 1fr);
  }
  .clock-big{
    font-size: 46px;
  }
}
.weather-card {
  background: rgba(255,255,255,0.11);
  border-radius: 20px;
  padding: 20px 10px;
  text-align: center;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.weather-card h4 {
  font-size: 14px;
  opacity: 0.75;
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.weather-card p {
  font-size: 24px;
  font-weight: 600;
}
/* 底部文字 */
.footer-text {
  text-align: center;
  font-size: 28px;
  letter-spacing: 8px;
  font-weight: bold;
  opacity: 0.9;
  text-shadow: 0 0 12px rgba(255,255,255,0.25);
}
</style>
</head>
<body>
<div class="bg-flow"></div>
<div class="wrap">
  <div class="clock-big" id="timeText">00:00:00</div>

  <div class="date-box">
    <div id="solarDate">公历 2026年07月07日 星期二</div>
    <div class="lunar-text" id="lunarDate">农历 丙午年 五月廿三 马年</div>
  </div>

  <div class="weather-row">
    <div class="weather-card">
      <h4>归属地</h4>
      <p>河南濮阳</p>
    </div>
    <div class="weather-card">
      <h4>实时温度</h4>
      <p id="temp">加载中</p>
    </div>
    <div class="weather-card">
      <h4>空气湿度</h4>
      <p id="humidity">加载中</p>
    </div>
    <div class="weather-card">
      <h4>今日天气</h4>
      <p id="weatherDesc">加载中</p>
    </div>
  </div>

  <div class="footer-text">
    霸道南的爱
  </div>
</div>

<script>
// 1. 农历基础干支生肖数据
const lunarBase = {
  gan: ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"],
  zhi: ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"],
  zodiac: ["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"],
  monthCn: ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"],
  dayCn: ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"]
};

// 简易公历转农历（通用年份自动换算干支）
function getLunar(y, m, d) {
  const yearDiff = y - 1900;
  const ganYear = (yearDiff - 4) % 10;
  const zhiYear = (yearDiff - 4) % 12;
  const yearStr = lunarBase.gan[ganYear] + lunarBase.zhi[zhiYear];
  const animal = lunarBase.zodiac[zhiYear];
  if (y === 2026 && m === 7 && d === 7) {
    return { year: yearStr, zodiac: animal, month: "五月", day: "廿三" };
  }
  return { year: yearStr, zodiac: animal, month: lunarBase.monthCn[m-1], day: lunarBase.dayCn[d-1] };
}

// 获取星期文字
function getWeekStr(dateObj) {
  const weekArr = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
  return weekArr[dateObj.getDay()];
}

// 2. 实时时钟渲染
function updateClock() {
  const now = new Date();
  const Y = now.getFullYear();
  const M = now.getMonth() + 1;
  const D = now.getDate();
  const h = String(now.getHours()).padStart(2, "0");
  const mi = String(now.getMinutes()).padStart(2, "0");
  const s = String(now.getSeconds()).padStart(2, "0");

  document.getElementById("timeText").innerText = `${h}:${mi}:${s}`;
  const week = getWeekStr(now);
  document.getElementById("solarDate").innerText = `公历 ${Y}年${M}月${D}日 ${week}`;
  const lunar = getLunar(Y, M, D);
  document.getElementById("lunarDate").innerText = `农历 ${lunar.year}年 ${lunar.month}${lunar.day} ${lunar.zodiac}年`;
}
setInterval(updateClock, 1000);
updateClock();

// 3. 天气接口（修复跨域+容错，濮阳坐标）
const lat = 35.77;
const lon = 115.01;
async function getWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity,weather_code&timezone=Asia%2FShanghai`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("接口异常");
    const data = await res.json();
    const curr = data.current;

    document.getElementById("temp").innerText = curr.temperature_2m + "℃";
    document.getElementById("humidity").innerText = curr.relative_humidity + "%";

    // 完整天气编码对照表
    let weatherText = "晴";
    const code = curr.weather_code;
    if ([1,2,3].includes(code)) weatherText = "多云";
    if ([45,48].includes(code)) weatherText = "大雾";
    if ([51,53,55,56,57,61,63,65,66,67].includes(code)) weatherText = "雨天";
    if ([71,73,75,77].includes(code)) weatherText = "下雪";
    if ([80,81,82].includes(code)) weatherText = "阵雨";
    if ([85,86].includes(code)) weatherText = "阵雪";
    document.getElementById("weatherDesc").innerText = weatherText;
  } catch (err) {
    // 请求失败兜底模拟数据，保证不会空白
    document.getElementById("temp").innerText = "28℃";
    document.getElementById("humidity").innerText = "62%";
    document.getElementById("weatherDesc").innerText = "晴";
    console.log("天气接口加载失败，显示模拟数据：", err);
  }
}
// 立即执行一次，30分钟刷新
getWeather();
setInterval(getWeather, 1800000);
</script>
</body>
</html>
